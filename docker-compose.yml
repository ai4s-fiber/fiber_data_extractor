services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiber_v6}
      POSTGRES_USER: ${POSTGRES_USER:-fiber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fiber}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-fiber_v6}
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      PARSE_ARTIFACT_DIR: /data/parse_artifacts
      DEFAULT_PARSER_STRATEGY: ${DEFAULT_PARSER_STRATEGY:-legacy}
      MINERU_ENABLED: ${MINERU_ENABLED:-false}
      MINERU_API_URL: ${MINERU_API_URL:-http://127.0.0.1:8001}
      MINERU_CLOUD_TOKEN: ${MINERU_CLOUD_TOKEN:-}
      EXTRACTION_MAX_CONCURRENT_JOBS: "2"
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/data/uploads
      - exports:/data/exports
      - parse_artifacts:/data/parse_artifacts

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  exports:
  parse_artifacts:
