version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fiber_v6
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fiber_v6
      SECRET_KEY: change-me-in-production
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads:/data/uploads
      - exports:/data/exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  exports:
