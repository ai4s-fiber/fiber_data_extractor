services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiber_v6}
      POSTGRES_USER: ${POSTGRES_USER:-fiber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fiber}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-fiber_v6}
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      PARSE_ARTIFACT_DIR: /data/parse_artifacts
      DEFAULT_PARSER_STRATEGY: ${DEFAULT_PARSER_STRATEGY:-mineru_cloud}
      MINERU_ENABLED: ${MINERU_ENABLED:-true}
      MINERU_API_URL: ${MINERU_API_URL:-http://127.0.0.1:8001}
      MINERU_CLOUD_TOKEN: ${MINERU_CLOUD_TOKEN:-}
      MINERU_CLOUD_TRUST_ENV: ${MINERU_CLOUD_TRUST_ENV:-true}
      MINERU_CLOUD_MODEL_VERSION: ${MINERU_CLOUD_MODEL_VERSION:-vlm}
      MINERU_CLOUD_PAGE_RANGES: ${MINERU_CLOUD_PAGE_RANGES:-}
      MINERU_CLOUD_ENABLE_FORMULA: ${MINERU_CLOUD_ENABLE_FORMULA:-true}
      MINERU_CLOUD_ENABLE_TABLE: ${MINERU_CLOUD_ENABLE_TABLE:-true}
      MINERU_CLOUD_IS_OCR: ${MINERU_CLOUD_IS_OCR:-false}
      MINERU_CLOUD_BATCH_SIZE: ${MINERU_CLOUD_BATCH_SIZE:-20}
      MINERU_CLOUD_UPLOAD_CONCURRENCY: ${MINERU_CLOUD_UPLOAD_CONCURRENCY:-8}
      MINERU_CLOUD_MAX_RETRIES: ${MINERU_CLOUD_MAX_RETRIES:-4}
      MINERU_CLOUD_RETRY_BASE_SECONDS: ${MINERU_CLOUD_RETRY_BASE_SECONDS:-2}
      MINERU_REUSE_PARSE_ARTIFACTS: ${MINERU_REUSE_PARSE_ARTIFACTS:-true}
      MINERU_CLOUD_FALLBACK_LOCAL: ${MINERU_CLOUD_FALLBACK_LOCAL:-false}
      MINERU_FALLBACK_LEGACY_PARSER: ${MINERU_FALLBACK_LEGACY_PARSER:-false}
      MINERU_FORMULA_ENABLE: ${MINERU_FORMULA_ENABLE:-true}
      MINERU_TABLE_ENABLE: ${MINERU_TABLE_ENABLE:-true}
      MINERU_IMAGE_ANALYSIS_ENABLE: ${MINERU_IMAGE_ANALYSIS_ENABLE:-true}
      MINERU_HYBRID_EFFORT: ${MINERU_HYBRID_EFFORT:-medium}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      DEFAULT_LLM_BASE_URL: ${DEFAULT_LLM_BASE_URL:-https://aigw.sotatts.online/v1}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-5.5}
      EXTRACTION_MAX_CONCURRENT_JOBS: ${EXTRACTION_MAX_CONCURRENT_JOBS:-3}
      EXTRACTION_MAX_ATTEMPTS: ${EXTRACTION_MAX_ATTEMPTS:-2}
      EXTRACTION_RETRY_BASE_SECONDS: ${EXTRACTION_RETRY_BASE_SECONDS:-5}
      EXTRACTION_PIPELINE_TIMEOUT_SECONDS: ${EXTRACTION_PIPELINE_TIMEOUT_SECONDS:-1800}
      EXTRACT_REVIEW_ARTICLES: ${EXTRACT_REVIEW_ARTICLES:-false}
      STRONG_LLM_PARALLEL_CALLS: ${STRONG_LLM_PARALLEL_CALLS:-4}
      STRONG_HOLISTIC_SAMPLE_MAX_CHARS: ${STRONG_HOLISTIC_SAMPLE_MAX_CHARS:-16000}
      STRONG_HOLISTIC_CATALOG_REASONING_EFFORT: ${STRONG_HOLISTIC_CATALOG_REASONING_EFFORT:-low}
      STRONG_HOLISTIC_PERFORMANCE_TIMEOUT_SECONDS: ${STRONG_HOLISTIC_PERFORMANCE_TIMEOUT_SECONDS:-180}
      STRONG_HOLISTIC_PERFORMANCE_WINDOW_CHARS: ${STRONG_HOLISTIC_PERFORMANCE_WINDOW_CHARS:-9000}
      STRONG_HOLISTIC_WINDOW_OVERLAP_BLOCKS: ${STRONG_HOLISTIC_WINDOW_OVERLAP_BLOCKS:-1}
      STRONG_HOLISTIC_PARALLEL_CALLS: ${STRONG_HOLISTIC_PARALLEL_CALLS:-3}
      STRONG_HOLISTIC_BACKGROUND_TIMEOUT_SECONDS: ${STRONG_HOLISTIC_BACKGROUND_TIMEOUT_SECONDS:-60}
      STRONG_HOLISTIC_BACKGROUND_MAX_CHARS: ${STRONG_HOLISTIC_BACKGROUND_MAX_CHARS:-9000}
      STRONG_HOLISTIC_BACKGROUND_MAX_TOKENS: ${STRONG_HOLISTIC_BACKGROUND_MAX_TOKENS:-1400}
      STRONG_TABLE_LLM_TIMEOUT_SECONDS: ${STRONG_TABLE_LLM_TIMEOUT_SECONDS:-75}
      STRONG_STAGE2_PARTIAL_FAILURE_MIN_FACTS: ${STRONG_STAGE2_PARTIAL_FAILURE_MIN_FACTS:-3}
      LLM_REQUEST_MAX_RETRIES: ${LLM_REQUEST_MAX_RETRIES:-3}
      LLM_GLOBAL_MAX_CONCURRENT_CALLS: ${LLM_GLOBAL_MAX_CONCURRENT_CALLS:-16}
      LLM_BATCH_MAX_CONCURRENT_CALLS: ${LLM_BATCH_MAX_CONCURRENT_CALLS:-12}
      LLM_INTERACTIVE_RESERVED_CALLS: ${LLM_INTERACTIVE_RESERVED_CALLS:-4}
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/data/uploads
      - exports:/data/exports
      - parse_artifacts:/data/parse_artifacts

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  exports:
  parse_artifacts:
